name: Python Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Changed to 3.11 for better Vercel compatibility

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install fastapi uvicorn pydantic openai

    - name: Check File Structure
      run: |
        ls -R # This will print your folders in the logs so we can see where index.py is
        
    - name: Syntax Check
      run: |
        # We tell Python specifically where your file is
        python -m py_compile api/index.py
